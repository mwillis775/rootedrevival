version: '3.8'

services:
  scholar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholar
    restart: unless-stopped
    ports:
      - "8889:8889"   # Scholar API
      - "8080:8080"   # GrabNet Gateway
      - "4001:4001"   # GrabNet P2P
    volumes:
      - scholar-data:/data/scholar
      - grabnet-data:/data/grabnet
      - ./scholar-static:/home/scholar/.local/share/scholar/static:ro
    environment:
      - RUST_LOG=info
      - SCHOLAR_DATA_DIR=/data/scholar
      - GRAB_DATA_DIR=/data/grabnet
    networks:
      - revival-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Tor hidden service
  tor:
    image: goldy/tor-hidden-service:latest
    container_name: tor-hidden-service
    restart: unless-stopped
    depends_on:
      - scholar
    environment:
      # Scholar hidden service
      SCHOLAR_TOR_SERVICE_HOSTS: "80:scholar:8889"
      SCHOLAR_TOR_SERVICE_VERSION: "3"
      # GrabNet hidden service  
      GRABNET_TOR_SERVICE_HOSTS: "80:scholar:8080"
      GRABNET_TOR_SERVICE_VERSION: "3"
    volumes:
      - tor-keys:/var/lib/tor/hidden_service
    networks:
      - revival-net

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    depends_on:
      - scholar
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - revival-net

  # Optional: Watchtower for auto-updates
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # Check daily
    command: --interval 86400 scholar

volumes:
  scholar-data:
    driver: local
  grabnet-data:
    driver: local
  tor-keys:
    driver: local

networks:
  revival-net:
    driver: bridge
