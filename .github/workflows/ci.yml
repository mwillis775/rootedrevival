name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Code Quality
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            grab -> target
            scholar -> target

      - name: Check formatting (GrabNet)
        run: cargo fmt --manifest-path grab/Cargo.toml -- --check

      - name: Check formatting (Scholar)
        run: cargo fmt --manifest-path scholar/Cargo.toml -- --check

      - name: Clippy (GrabNet)
        run: cargo clippy --manifest-path grab/Cargo.toml -- -D warnings

      - name: Clippy (Scholar)
        run: cargo clippy --manifest-path scholar/Cargo.toml -- -D warnings

  # ============================================================================
  # Build & Test
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            grab -> target
            scholar -> target

      - name: Build GrabNet
        run: cargo build --manifest-path grab/Cargo.toml --release

      - name: Build Scholar
        run: cargo build --manifest-path scholar/Cargo.toml --release

      - name: Run GrabNet tests
        run: cargo test --manifest-path grab/Cargo.toml --release

      - name: Run Scholar unit tests
        run: cargo test --manifest-path scholar/Cargo.toml --release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: |
            grab/target/release/grab
            scholar/target/release/scholar

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-ubuntu-latest

      - name: Make binaries executable
        run: |
          chmod +x grab/target/release/grab
          chmod +x scholar/target/release/scholar

      - name: Start GrabNet
        run: |
          ./grab/target/release/grab gateway --port 8080 &
          sleep 5

      - name: Start Scholar
        run: |
          ./scholar/target/release/scholar --port 8889 &
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:8889/api/health
          curl -f http://localhost:8080/api/network || true

      - name: Run integration tests
        run: cargo test --manifest-path scholar/Cargo.toml --test integration_tests -- --ignored

  # ============================================================================
  # Security Audit
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit GrabNet dependencies
        run: cargo audit --file grab/Cargo.lock || true

      - name: Audit Scholar dependencies
        run: cargo audit --file scholar/Cargo.lock || true

  # ============================================================================
  # Docker Build
  # ============================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Release
  # ============================================================================
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: binaries-ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            artifact: binaries-macos-latest
            suffix: darwin-x86_64

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Package binaries
        run: |
          mkdir -p release
          cp grab/target/release/grab release/grab-${{ matrix.suffix }}
          cp scholar/target/release/scholar release/scholar-${{ matrix.suffix }}
          tar -czvf revival-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz -C release .

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: revival-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz

  # ============================================================================
  # Deploy
  # ============================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, integration, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/revival
            git pull origin main

            # Rebuild binaries if Rust source changed
            cd scholar && cargo build --release && sudo cp target/release/scholar /usr/local/bin/ && cd ..
            cd grab && cargo build --release && sudo cp target/release/grab /usr/local/bin/ && cd ..

            # Restart API server
            sudo systemctl restart scholar

            # Publish updated site content to GrabNet gateway
            # Stop gateway to release DB lock, update site, restart gateway
            sudo systemctl stop grabnet || true
            sleep 1
            grab update rootedrevival || grab publish site --name rootedrevival
            sudo systemctl start grabnet

      - name: Health check
        run: |
          sleep 15
          curl -f https://scholar.rootedrevival.us/api/health
          curl -sf https://rootedrevival.us/ -o /dev/null

      - name: Notify success
        if: success()
        run: |
          echo "Deployment successful!"

      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment failed!"
