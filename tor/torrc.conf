# Tor Configuration for Open Scholar & GrabNet
# Add this to /etc/tor/torrc or use setup.sh

# ========================================
# General Settings
# ========================================

# Run as daemon
RunAsDaemon 1

# Log to syslog (or specify LogFile)
Log notice syslog

# ========================================
# Open Scholar Hidden Service
# ========================================
# Exposes Scholar web interface on port 80 via Tor

HiddenServiceDir /var/lib/tor/scholar/
HiddenServicePort 80 127.0.0.1:8889

# ========================================
# GrabNet Gateway Hidden Service  
# ========================================
# Exposes GrabNet HTTP gateway on port 80 via Tor

HiddenServiceDir /var/lib/tor/grabnet/
HiddenServicePort 80 127.0.0.1:8888

# ========================================
# Optional: GrabNet P2P (Advanced)
# ========================================
# If you want to expose the P2P port (not typical for hidden services)
# This would allow direct peer connections over Tor

# HiddenServiceDir /var/lib/tor/grabnet-p2p/
# HiddenServicePort 4001 127.0.0.1:4001

# ========================================
# Security Hardening (Optional)
# ========================================

# Limit connections per circuit (prevent abuse)
# HiddenServiceMaxStreams 100
# HiddenServiceMaxStreamsCloseCircuit 1

# Version 3 onion services only (recommended, default in modern Tor)
# HiddenServiceVersion 3
